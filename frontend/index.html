<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证研究原型系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button id="tabEmoji" class="tab active" onclick="switchTab('Emoji_Password')">表情密码</button>
            <button id="tabNumeric" class="tab" onclick="switchTab('Numeric_PIN')">数字 PIN</button>
        </div>

        <h2 id="titleText">请选择您的表情密码</h2>
        <p class="instruction">请按顺序选择 4 位密码。输入 0.5 秒后将被安全隐藏。</p>
        
        <div class="password-display" id="passwordDisplay">
            <div class="slot" id="slot-0"></div>
            <div class="slot" id="slot-1"></div>
            <div class="slot" id="slot-2"></div>
            <div class="slot" id="slot-3"></div>
        </div>

        <div class="keyboard" id="emojiKeyboard"></div>

        <div class="keyboard numeric-keyboard" id="numericKeyboard" style="display: none;"></div>

        <div class="controls">
            <button class="btn btn-clear" id="clearBtn" onclick="clearPassword()">清除 (Clear)</button>
            <button class="btn btn-submit" id="submitBtn" onclick="submitPassword()" disabled>提交 (Submit)</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
