<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Phase</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .user-input-section { margin-bottom: 15px; text-align: left; }
        .user-input-section input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .attempts-display { color: #f44336; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container" style="padding-top: 20px;">
        <h2>Password Verification</h2>
        
        <div class="user-input-section">
            <label for="userIdInput" style="font-size: 13px; color: #555;">Enter your Study ID (e.g., 1, 2):</label>
            <input type="number" id="userIdInput" placeholder="e.g., 1">
        </div>

        <div class="tabs">
            <button id="tabEmoji" class="tab active" onclick="switchTab('Emoji_Password')">Emoji Password</button>
            <button id="tabNumeric" class="tab" onclick="switchTab('Numeric_PIN')">Numeric PIN</button>
        </div>

        <p class="instruction">Please recall and enter your password.</p>
        
        <div id="attemptsDisplay" class="attempts-display" style="display: none;">Current Attempt: 1</div>

        <div class="password-display" id="passwordDisplay">
            <div class="slot" id="slot-0"></div>
            <div class="slot" id="slot-1"></div>
            <div class="slot" id="slot-2"></div>
            <div class="slot" id="slot-3"></div>
        </div>

        <div class="toggle-section" style="margin-bottom: 10px; display: flex; justify-content: flex-end; font-size: 13px; color: #666; white-space: nowrap;">
            <label style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
                <input type="checkbox" id="randomKeyboardToggle" onchange="toggleRandomKeyboard()" style="margin: 0;">
                🔀 Randomize keyboard layout on every reset
            </label>
        </div>

        <div class="keyboard" id="emojiKeyboard"></div>
        <div class="keyboard numeric-keyboard" id="numericKeyboard" style="display: none;"></div>

        <div class="controls">
            <button class="btn btn-clear" id="clearBtn" onclick="clearPassword()">Clear</button>
            <button class="btn btn-submit" id="submitBtn" onclick="verifyPassword()" disabled>Verify</button>
        </div>
        
        <div style="margin-top: 20px; text-align: center;">
            <button onclick="exportData()" style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px;">
                📊 Export All Study Data (CSV)
            </button>
        </div>
        
        <div style="margin-top: 20px; text-align: center; font-size: 13px;">
            <a href="index.html" style="color: #888; text-decoration: none;">
                ⬅ Back to Enrollment Phase
            </a>
        </div>
    </div>

    <script src="verify.js"></script>
</body>
</html>
